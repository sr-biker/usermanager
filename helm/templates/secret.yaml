{{- if not .Values.db.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "usermanager.dbSecretName" . }}
  labels:
    {{- include "usermanager.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Native Spring Boot relaxed-binding env var names (spring.datasource.username ->
  # SPRING_DATASOURCE_USERNAME) -- overrides application-local.properties' hardcoded
  # values directly, no custom placeholder properties needed in the app itself.
  SPRING_DATASOURCE_USERNAME: {{ .Values.db.username | quote }}
  SPRING_DATASOURCE_PASSWORD: {{ .Values.db.password | quote }}
{{- end }}
---
{{- if not .Values.aws.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "usermanager.awsSecretName" . }}
  labels:
    {{- include "usermanager.labels" . | nindent 4 }}
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: {{ .Values.aws.accessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.aws.secretAccessKey | quote }}
  AWS_SESSION_TOKEN: {{ .Values.aws.sessionToken | quote }}
{{- end }}
