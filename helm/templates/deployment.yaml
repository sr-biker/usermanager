apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "usermanager.name" . }}
  labels:
    {{- include "usermanager.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "usermanager.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "usermanager.labels" . | nindent 8 }}
    spec:
      {{- if .Values.image.pullSecretName }}
      imagePullSecrets:
        - name: {{ .Values.image.pullSecretName }}
      {{- end }}
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8081
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.springProfile | quote }}
            # host/port/name are never secret -- set individually rather than via a Secret.
            # Username/password come from envFrom below instead (real secret values).
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://{{ .Values.db.host }}:{{ .Values.db.port }}/{{ .Values.db.name }}"
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.kafka.bootstrapServers | quote }}
            - name: USERMANAGER_S3_BUCKET
              value: {{ .Values.s3.bucket | quote }}
            - name: AWS_REGION
              value: {{ .Values.aws.region | quote }}
          envFrom:
            - secretRef:
                name: {{ include "usermanager.dbSecretName" . }}
            - secretRef:
                name: {{ include "usermanager.awsSecretName" . }}
          # Liveness only checks the in-process livenessState — never Postgres — so a DB
          # outage doesn't cause Kubernetes to kill and restart otherwise-healthy pods.
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          # Readiness includes the DB check (management.endpoint.health.group.readiness.include=
          # readinessState,db in application.properties) — pod stops receiving traffic while
          # Postgres is unreachable, without being restarted. Verified live: killing the DB
          # container flips this to DOWN/503 while liveness stays UP.
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
